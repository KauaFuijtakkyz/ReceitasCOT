<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReceitasCOT - Receita Gerada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .content {
            padding: 40px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 15px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .ingredient-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .ingredient-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .instructions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.8;
        }
        .instructions ol {
            margin-left: 20px;
        }
        .instructions li {
            margin-bottom: 10px;
        }
        .info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .info-box strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        /* Estado de Carregamento e Erro */
        .status-mensagem {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }
        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="titulo">🍳 Carregando Receita...</h1>
        <p>Receita Gerada por Inteligência Artificial</p>
    </div>

    <!-- Bloco de Feedback Visual dinâmico -->
    <div id="status-bloco" class="status-mensagem">
        Buscando dados no servidor Java...
    </div>

    <div class="content" id="conteudo-receita" style="display: none;">
        <div class="section">
            <h2>Ingredientes</h2>
            <div class="ingredient-list" id="ingredients"></div>
        </div>
        <div class="section">
            <h2>Modo de Preparo</h2>
            <div class="instructions" id="instructions"></div>
        </div>
        <div class="info">
            <div class="info-box">
                <strong>⏱️ Tempo</strong>
                <span id="tempo">-</span>
            </div>
            <div class="info-box">
                <strong>📊 Dificuldade</strong>
                <span id="dificuldade">-</span>
            </div>
            <div class="info-box">
                <strong>👥 Porções</strong>
                <span id="porcoes">-</span>
            </div>
        </div>
    </div>
    <footer>
        <p>ReceitasCOT © 2026</p>
    </footer>
</div>

<script>
    // CONFIGURAÇÃO DA API: Altere para o endereço correto do seu servidor Java
    const API_URL = 'http://localhost:8080/api/receitas';

    // Função responsável por atualizar a interface gráfica com o JSON do Java
    function preencherReceita(dados) {
        document.getElementById('titulo').textContent = '🍳 ' + (dados.titulo || 'Receita Sem Título');

        // 1. Renderizar os Ingredientes (Mapeado da List<String> do Java)
        const ingredientsContainer = document.getElementById('ingredients');
        ingredientsContainer.innerHTML = '';
        if (dados.ingredientes && dados.ingredientes.length > 0) {
            dados.ingredientes.forEach(ing => {
                const div = document.createElement('div');
                div.className = 'ingredient-item';
                div.textContent = ing;
                ingredientsContainer.appendChild(div);
            });
        } else {
            ingredientsContainer.innerHTML = '<div class="ingredient-item">Nenhum ingrediente listado.</div>';
        }

        // 2. Renderizar o Modo de Preparo (Mapeado da List<String> do Java)
        const instructionsContainer = document.getElementById('instructions');
        instructionsContainer.innerHTML = '';

        if (dados.modoPreparo && dados.modoPreparo.length > 0) {
            const ol = document.createElement('ol');
            dados.modoPreparo.forEach(passo => {
                const li = document.createElement('li');
                li.textContent = passo;
                ol.appendChild(li);
            });
            instructionsContainer.appendChild(ol);
        } else {
            instructionsContainer.textContent = 'Nenhuma instrução fornecida.';
        }

        // 3. Renderizar as Informações adicionais
        document.getElementById('tempo').textContent = dados.tempo || 'Não informado';
        document.getElementById('dificuldade').textContent = dados.dificuldade || 'Não informada';

        const porcoesTexto = String(dados.porcoes || 0).toLowerCase().includes('pessoa')
            ? dados.porcoes
            : (dados.porcoes || 0) + ' pessoas';
        document.getElementById('porcoes').textContent = porcoesTexto;
    }

    // Executa automaticamente ao abrir ou atualizar a página no navegador
    window.addEventListener('DOMContentLoaded', async () => {
        const statusBloco = document.getElementById('status-bloco');
        const conteudoReceita = document.getElementById('conteudo-receita');

        try {
            // Executa chamada assíncrona HTTP GET para a sua API Java
            const resposta = await fetch(API_URL, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            });

            if (!resposta.ok) {
                throw new Error(`Erro no servidor: Código ${resposta.status}`);
            }

            const dadosReceita = await resposta.json();

            // Popula a árvore DOM e exibe o bloco principal
            preencherReceita(dadosReceita);
            statusBloco.style.display = 'none';
            conteudoReceita.style.display = 'block';

        } catch (erro) {
            console.error('Falha na integração com o Java:', erro);
            document.getElementById('titulo').textContent = '❌ Erro de Conexão';
            statusBloco.innerHTML = `Não foi possível carregar a receita.<br><small style="color: red;">${erro.message}</small>`;
        }
    });
</script>
</body>
</html>
